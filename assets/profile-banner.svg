    <path d="M876 150H1060" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M876 184H982" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>

    <circle cx="846" cy="116" r="5" fill="#2dd4bf"/>
    <circle cx="846" cy="150" r="5" fill="#60a5fa"/>
    <circle cx="846" cy="184" r="5" fill="#94a3b8"/>
    <path d="M846 121V145M846 155V179" stroke="#334155" stroke-width="1.5" stroke-linecap="round"/>

    <path d="M1018 112L1054 150L1018 188" stroke="url(#mark)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M940 194L994 106" stroke="url(#mark)" stroke-width="2.5" stroke-linecap="round"/>
