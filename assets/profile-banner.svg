<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Markussiin</title>
  <desc id="desc">A minimal modern GitHub profile banner for Markussiin focused on practical software, web apps, automation, and local-first tools.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b1117"/>
      <stop offset="1" stop-color="#10151f"/>
    </linearGradient>
    <linearGradient id="line" x1="84" y1="226" x2="760" y2="226" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2dd4bf"/>
      <stop offset="0.56" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="mark" x1="790" y1="64" x2="1104" y2="236" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#243244" stroke-width="1" opacity="0.28"/>
    </pattern>
    <style>
      .sans { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>

  <rect width="1200" height="300" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="300" rx="24" fill="url(#grid)" opacity="0.42"/>
  <rect x="1" y="1" width="1198" height="298" rx="23" stroke="#263244" stroke-width="2"/>

  <path d="M86 226H760" stroke="url(#line)" stroke-width="2" stroke-linecap="round"/>
  <path d="M86 228H760" stroke="#020617" stroke-width="1" stroke-linecap="round" opacity="0.42"/>

  <text class="sans" x="84" y="123" fill="#f8fafc" font-size="70" font-weight="780" letter-spacing="0">Markussiin</text>
  <text class="sans" x="88" y="166" fill="#cbd5e1" font-size="24" font-weight="430" letter-spacing="0">Practical software, clean demos, and tools that are easy to run.</text>
  <text class="mono" x="90" y="203" fill="#8fa3b8" font-size="16" font-weight="600" letter-spacing="0">web apps / automation / local-first tools / developer utilities</text>
  <text class="mono" x="90" y="257" fill="#64748b" font-size="14" font-weight="600" letter-spacing="0">C++  /  JavaScript  /  TypeScript  /  Node.js</text>

  <g opacity="0.96">
    <path d="M858 76H1072C1088 76 1100 88 1100 104V196C1100 212 1088 224 1072 224H858C842 224 830 212 830 196V104C830 88 842 76 858 76Z" stroke="#334155" stroke-width="1.5"/>
