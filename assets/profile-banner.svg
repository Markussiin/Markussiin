<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Markussiin</title>
  <desc id="desc">A polished GitHub profile banner for Markussiin focused on practical software, web apps, automation, and local-first tools.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111f"/>
      <stop offset="0.45" stop-color="#0d1b2f"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="beam" x1="96" y1="262" x2="1078" y2="70" gradientUnits="userSpaceOnUse">
      <stop stop-color="#36f1cd"/>
      <stop offset="0.45" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#b58cff"/>
    </linearGradient>
    <linearGradient id="card" x1="695" y1="58" x2="1088" y2="252" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111f32"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(190 86) rotate(34) scale(270 120)">
      <stop stop-color="#36f1cd" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#36f1cd" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(975 88) rotate(140) scale(240 130)">
      <stop stop-color="#b58cff" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#b58cff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#26364d" stroke-width="1" opacity="0.42"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
    <style>
      .sans { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>

  <rect width="1200" height="320" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="28" fill="url(#grid)" opacity="0.58"/>
  <rect width="1200" height="320" rx="28" fill="url(#glowA)"/>
  <rect width="1200" height="320" rx="28" fill="url(#glowB)"/>
  <path d="M78 252C218 196 278 102 426 128C544 149 584 224 718 202C866 178 948 78 1118 68" stroke="url(#beam)" stroke-width="2" opacity="0.5"/>
  <path d="M94 268C238 214 310 150 442 166C566 181 634 246 756 218C898 186 976 120 1108 116" stroke="url(#beam)" stroke-width="1" opacity="0.22"/>
  <rect x="1" y="1" width="1198" height="318" rx="27" stroke="#334155" stroke-width="2"/>

  <g filter="url(#softShadow)">
    <rect x="72" y="54" width="560" height="208" rx="24" fill="#07101d" fill-opacity="0.72" stroke="#2a3b53"/>
    <rect x="96" y="78" width="172" height="30" rx="15" fill="#112033" stroke="#2b425e"/>
    <circle cx="113" cy="93" r="5" fill="#36f1cd"/>
    <text class="mono" x="128" y="99" fill="#9ed8ff" font-size="13" font-weight="700">PRACTICAL BUILDS</text>

    <text class="sans" x="96" y="154" fill="#f8fafc" font-size="64" font-weight="800" letter-spacing="0">Markussiin</text>
    <text class="sans" x="99" y="190" fill="#cbd5e1" font-size="22" font-weight="450" letter-spacing="0">Practical software with clean demos, clear READMEs,</text>
    <text class="sans" x="99" y="219" fill="#cbd5e1" font-size="22" font-weight="450" letter-spacing="0">and useful tools that are easy to run.</text>

    <rect x="96" y="236" width="78" height="28" rx="9" fill="#101b2b" stroke="#2d4058"/>
    <text class="mono" x="119" y="255" fill="#36f1cd" font-size="14" font-weight="750">C++</text>
    <rect x="186" y="236" width="124" height="28" rx="9" fill="#101b2b" stroke="#2d4058"/>
    <text class="mono" x="207" y="255" fill="#f7df1e" font-size="14" font-weight="750">JavaScript</text>
    <rect x="322" y="236" width="122" height="28" rx="9" fill="#101b2b" stroke="#2d4058"/>
    <text class="mono" x="343" y="255" fill="#58a6ff" font-size="14" font-weight="750">TypeScript</text>
    <rect x="456" y="236" width="112" height="28" rx="9" fill="#101b2b" stroke="#2d4058"/>
    <text class="mono" x="481" y="255" fill="#c4b5fd" font-size="14" font-weight="750">Node.js</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="684" y="54" width="444" height="208" rx="24" fill="url(#card)" stroke="#2a3b53"/>
    <rect x="704" y="76" width="404" height="34" rx="12" fill="#07101d" stroke="#26384e"/>
    <circle cx="724" cy="93" r="5" fill="#ff5f57"/>
    <circle cx="742" cy="93" r="5" fill="#ffbd2e"/>
    <circle cx="760" cy="93" r="5" fill="#28c840"/>
    <text class="mono" x="788" y="99" fill="#8ca3bd" font-size="13">profile-build.sh</text>

    <text class="mono" x="708" y="139" fill="#36f1cd" font-size="16" font-weight="700">$ build --practical --polished</text>
    <text class="mono" x="708" y="168" fill="#dbeafe" font-size="15">systems .... ready</text>
    <text class="mono" x="708" y="193" fill="#dbeafe" font-size="15">web apps ... shipped</text>
    <text class="mono" x="708" y="218" fill="#dbeafe" font-size="15">automation . useful</text>
    <text class="mono" x="708" y="243" fill="#dbeafe" font-size="15">local-first . clean</text>

    <rect x="948" y="126" width="136" height="32" rx="10" fill="#0d9488" fill-opacity="0.18" stroke="#2dd4bf"/>
    <text class="mono" x="973" y="147" fill="#99f6e4" font-size="13" font-weight="800">SMALL APPS</text>
    <rect x="948" y="170" width="136" height="32" rx="10" fill="#2563eb" fill-opacity="0.18" stroke="#60a5fa"/>
    <text class="mono" x="981" y="191" fill="#bfdbfe" font-size="13" font-weight="800">CLI TOOLS</text>
    <rect x="948" y="214" width="136" height="32" rx="10" fill="#7c3aed" fill-opacity="0.18" stroke="#a78bfa"/>
    <text class="mono" x="977" y="235" fill="#ddd6fe" font-size="13" font-weight="800">DASHBOARDS</text>
  </g>

  <g opacity="0.78">
    <circle cx="650" cy="106" r="4" fill="#36f1cd"/>
    <circle cx="650" cy="160" r="4" fill="#58a6ff"/>
    <circle cx="650" cy="214" r="4" fill="#b58cff"/>
    <path d="M650 110V156M650 164V210" stroke="#4b6383" stroke-width="2" stroke-linecap="round"/>
    <path d="M632 106H604M632 160H604M632 214H604" stroke="#4b6383" stroke-width="2" stroke-linecap="round"/>
    <path d="M668 106H684M668 160H684M668 214H684" stroke="#4b6383" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
